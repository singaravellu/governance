name: Governance

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify approved workflow exists
        run: |
          test -f .github/workflows/deploy.yml

      - name: Verify approved workflow name
        run: |
          grep -q "name: Deploy" .github/workflows/deploy.yml
