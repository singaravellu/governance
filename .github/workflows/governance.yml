name: Governance Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify approved template usage
        run: |
          grep -q "platform-workflows" .github/workflows/deploy.yml

      - name: Verify approved workflow
        run: |
          grep -q "terraform-governance.yml" .github/workflows/deploy.yml


      - name: Verify secret scan template
        run: |
          grep -q "secret-scan.yml" .github/workflows/deploy.yml          